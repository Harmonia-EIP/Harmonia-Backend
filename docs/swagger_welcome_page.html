<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/static/icon.ico">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harmonia API</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
            overflow: hidden;
            background: #020617;
        }

        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 30%, #38bdf8, transparent),
                        radial-gradient(circle at 80% 70%, #6366f1, transparent),
                        radial-gradient(circle at 50% 50%, #0ea5e9, transparent);
            animation: moveBg 15s linear infinite;
            z-index: 0;
            opacity: 0.25;
        }

        @keyframes moveBg {
            0% { transform: translate(0, 0); }
            50% { transform: translate(-10%, -10%); }
            100% { transform: translate(0, 0); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            backdrop-filter: blur(25px);
            background: rgba(15, 23, 42, 0.7);
            padding: 70px 100px;
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            max-width: 900px;
            width: 90%;
        }

        .logo {
            width: 90px;
            margin-bottom: 20px;
            border-radius: 20px;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .logo:hover {
            transform: scale(1.1) rotate(5deg);
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #38bdf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            margin-bottom: 30px;
            color: #94a3b8;
        }

        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            flex-wrap: nowrap;
            width: 100%;
            margin-top: 20px;
        }

        a {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            transition: all 0.3s ease;
            font-weight: 600;
        }

        a:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 15px 35px rgba(99,102,241,0.5);
        }

        a:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(99,102,241,0.4);
        }

        .github {
            margin-top: 25px;
            width: 20%;
            display: inline-block;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .github:hover {
            opacity: 1;
        }

        .github img {
            width: 50px;
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="/static/logo.png" class="logo" alt="Harmonia Logo" />

        <h1>Harmonia API</h1>
        <p>Backend is running</p>

        <div class="links">
            <a href="/docs">Swagger UI</a>
            <a href="/redoc">ReDoc</a>
            <a href="https://harmonia-eip.github.io/Harmonia-App/">Frontend Docs</a>
        </div>

        <a href="https://github.com/Harmonia-EIP" target="_blank" class="github">
            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg" alt="GitHub" />
        </a>
    </div>
</body>
</html>
